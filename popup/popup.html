<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Miru</title>
  <link rel="stylesheet" href="../assets/fonts/fonts.css" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header class="header">
    <div class="brand">
      <svg class="logo" viewBox="0 0 48 56" fill="none" xmlns="http://www.w3.org/2000/svg" width="26" height="30">
        <path d="M24 28 C24 28 24 20 28 16 C32 12 36 14 36 20 C36 28 30 36 22 40 C14 44 10 40 12 34 C14 26 20 18 28 14 C36 10 42 14 42 22 C42 32 36 42 26 48"
          stroke="#2da96e" stroke-width="1.6" stroke-linecap="round" fill="none" opacity="0.9" />
      </svg>
      <span class="wordmark">miru</span>
    </div>
    <button class="gear" id="open-options" title="Tend your rhythm" aria-label="Settings">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"></circle>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
      </svg>
    </button>
  </header>

  <!-- Today's carried word (first light) -->
  <div class="intention" id="intention" hidden>
    <span class="intention-label">today</span>
    <span class="intention-word" id="intention-word"></span>
  </div>

  <!-- Manual breath session -->
  <section class="breath-cta">
    <button class="cta" id="begin-breath">Begin a breath</button>
    <div class="cta-sub">One guided minute.</div>
  </section>

  <!-- Focus session -->
  <section class="focus">
    <div id="focus-idle">
      <div class="usage-head">
        <span class="label">Focus session</span>
      </div>
      <div class="focus-pills" id="focus-pills">
        <button class="focus-pill" data-min="25">25 minutes</button>
        <button class="focus-pill" data-min="50">50 minutes</button>
      </div>
    </div>
    <div id="focus-active" hidden>
      <div class="usage-head">
        <span class="label">Focusing</span>
        <span class="total" id="focus-left"></span>
      </div>
      <button class="text-link focus-end" id="focus-end">end early</button>
    </div>
  </section>

  <!-- Time spent today -->
  <section class="usage">
    <div class="usage-head">
      <span class="label">Today</span>
      <span class="total" id="usage-total">—</span>
    </div>
    <ul class="usage-list" id="usage-list"></ul>
  </section>

  <footer class="footer">
    <button class="text-link" id="open-options-2">Tend your rhythm →</button>
  </footer>

  <script src="../utils/theme.js"></script>
  <script src="popup.js"></script>
</body>
</html>
